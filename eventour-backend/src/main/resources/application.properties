spring.application.name=Eventour







spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}?useSSL=true&requireSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# mientras diagnosticamos
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.datasource.hikari.connection-timeout=5000
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.maximum-pool-size=5







spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

jwt.secret=5x8koZKbzkTlfAcctclwRxTXm6M0a5PbR2GQtnSnGqs=


logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=INFO

logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.org.hibernate.engine.jdbc.spi.SqlExceptionHelper=ERROR

# (opcional) ver DDL al boot
logging.level.org.hibernate.tool.schema=DEBUG



# Mostrar mensaje de error en la respuesta (útil en logs /error)
server.error.include-message=always
server.error.include-binding-errors=always

server.port=${PORT}
server.address=0.0.0.0


